<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notion Viewer</title>
  <link rel="stylesheet" href="/style.css">
 </head>
<body>
  <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; flex-direction:column; gap:1rem; color:white;">
    <div style="background:#222; padding:2rem; border-radius:8px; display:flex; flex-direction:column; gap:1rem; width:280px; box-shadow:0 0 20px rgba(0,0,0,0.5);">
      <h2 style="margin:0; text-align:center;">Private Viewer</h2>
      <input type="text" id="loginUser" placeholder="Username" style="padding:0.7rem; border-radius:4px; border:none;">
      <input type="password" id="loginPass" placeholder="Password" style="padding:0.7rem; border-radius:4px; border:none;">
      <button id="loginBtn" style="padding:0.7rem; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Login</button>
      <div id="loginError" style="color:#ff4d4d; font-size:0.85rem; text-align:center; display:none;">認証に失敗しました</div>
    </div>
  </div>

  <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:900; align-items:center; justify-content:center; flex-direction:column; gap:1rem;">
    <div style="width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid #007bff; border-radius:50%; animation: spin 1s linear infinite;"></div>
    <div style="color:#333; font-weight:bold;">読み込み中...</div>
  </div>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <div id="app">
    <div id="card-container">
      <button id="prev" class="nav">‹</button>
      <div id="card" class="card">
        <h2 id="title"></h2>
        <div id="detail" class="detail"></div>
        <div id="comment" class="comment"></div>
        <div id="metaInfo" class="metaInfo"></div>
        <div class="actions">
          <textarea id="commentInput" placeholder="コメントを入力" rows="3"></textarea>
          <button id="sendComment">コメントを送信</button>
          <button id="likeBtn">👍 <span id="likeCount">0</span></button>
        </div>
      </div>
      <button id="next" class="nav">›</button>
    </div>
    <div id="hint">左右キー / ‹ › ボタンで切替</div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
